# Render Blueprint — set CLIENT_URL / PUBLIC_* / SMTP in the dashboard after create.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: kitchenos-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: kitchenos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: kitchenos-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: redis
    name: kitchenos-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: kitchenos-db
    plan: basic-256mb
    databaseName: kitchenos
    user: kitchenos
